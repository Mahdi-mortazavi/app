name: Release

# Fully autonomous release pipeline.
#
# Flow:
#   1. You merge Conventional-Commit PRs into `main` (feat:, fix:, perf: …).
#   2. release-please reads those commits and maintains a "release PR" that
#      bumps pubspec.yaml + CHANGELOG.md to the correct semver.
#   3. When you merge that release PR, release-please tags the version and
#      publishes a GitHub Release with auto-generated, categorized notes.
#   4. In the SAME run, a quality-gated job builds the arm64-v8a APK and
#      attaches it to that release.
#
# Nothing here needs a personal token: the build job is gated on
# release-please's own output, so there is no cross-workflow event that the
# default GITHUB_TOKEN would fail to trigger.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - id: rp
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-apk:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the released tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - run: flutter pub get

      # Quality gate — never attach an artifact from code that doesn't pass.
      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test --exclude-tags=screenshots

      # Release signing: materialize key.properties only if secrets exist.
      - name: Set up release keystore (if secrets configured)
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
            cat > android/key.properties <<EOF
          storeFile=release.keystore
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF
            echo "signed=release" >> "$GITHUB_OUTPUT"
          else
            echo "signed=debug" >> "$GITHUB_OUTPUT"
          fi

      - name: Build split-per-abi APKs (arm64-v8a + armeabi-v7a)
        run: flutter build apk --release --split-per-abi

      - name: Build universal APK
        run: flutter build apk --release

      - name: Package artifacts + SHA256SUMS
        id: artifact
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          out="build/app/outputs/flutter-apk"
          mkdir -p dist
          cp "$out/app-arm64-v8a-release.apk"   "dist/Nava-${TAG}-arm64-v8a.apk"
          cp "$out/app-armeabi-v7a-release.apk" "dist/Nava-${TAG}-armeabi-v7a.apk"
          cp "$out/app-release.apk"             "dist/Nava-${TAG}-universal.apk"
          (cd dist && sha256sum ./*.apk > SHA256SUMS.txt && cat SHA256SUMS.txt)

      - name: Append download guide to release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
          SIGNED: ${{ steps.keystore.outputs.signed }}
        run: |
          gh release view "$TAG" --json body -q .body > notes.md
          cat >> notes.md <<EOF

          ---
          ### 📥 کدام فایل را دانلود کنم؟ / Which file should I download?
          | فایل | مناسب برای |
          |---|---|
          | **Nava-${TAG}-arm64-v8a.apk** ✅ توصیه‌شده | اکثر گوشی‌های ۲۰۱۵ به بعد / most phones since ~2015 |
          | Nava-${TAG}-armeabi-v7a.apk | گوشی‌های قدیمی / older 32-bit phones |
          | Nava-${TAG}-universal.apk | مطمئن نیستید؟ این را بگیرید (حجم بیشتر) / not sure? take this (larger) |

          ### 🔐 Verify
          \`sha256sum -c SHA256SUMS.txt\`
          EOF
          if [ "$SIGNED" = "debug" ]; then
            printf '\n> ⚠️ This build is **debug-signed** (no release keystore configured yet).\n' >> notes.md
          fi
          gh release edit "$TAG" --notes-file notes.md

      - name: Attach artifacts to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: gh release upload "$TAG" dist/* --clobber
