name: Release

# Fully autonomous release pipeline.
#
# Flow:
#   1. You merge Conventional-Commit PRs into `main` (feat:, fix:, perf: …).
#   2. release-please reads those commits and maintains a "release PR" that
#      bumps pubspec.yaml + CHANGELOG.md to the correct semver.
#   3. When you merge that release PR, release-please tags the version and
#      publishes a GitHub Release with auto-generated, categorized notes.
#   4. In the SAME run, a quality-gated job builds the arm64-v8a APK and
#      attaches it to that release.
#
# Nothing here needs a personal token: the build job is gated on
# release-please's own output, so there is no cross-workflow event that the
# default GITHUB_TOKEN would fail to trigger.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - id: rp
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-apk:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the released tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      # Quality gate — never attach an artifact from code that doesn't pass.
      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build arm64-v8a release APK
        run: flutter build apk --release --target-platform android-arm64 --split-per-abi

      - name: Rename artifact
        id: artifact
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          src="build/app/outputs/flutter-apk/app-arm64-v8a-release.apk"
          dest="build/app/outputs/flutter-apk/Nava-${TAG}-android-arm64.apk"
          mv "$src" "$dest"
          echo "path=$dest" >> "$GITHUB_OUTPUT"

      - name: Attach APK to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: gh release upload "$TAG" "${{ steps.artifact.outputs.path }}" --clobber
