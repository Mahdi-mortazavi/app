name: PR Title Lint

# The autonomous release pipeline derives the next version and the changelog
# from Conventional Commits. With squash-merge, the PR *title* becomes the
# commit on main — so we validate the title here to keep that signal clean.
on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  lint-title:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Types accepted at the start of a PR title, e.g. "feat: add streaks".
          types: |
            feat
            fix
            perf
            a11y
            ui
            refactor
            docs
            test
            ci
            build
            chore
            revert
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" should start with a lowercase letter.
