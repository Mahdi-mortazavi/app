name: CI

# Fast quality gate for every change before it reaches main.
# Runs on pull requests and on pushes to any non-main branch. `main` itself is
# verified by the PR that targets it and by the Release pipeline afterwards, so
# we don't burn duplicate minutes re-checking it here.
on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# A newer commit on the same branch/PR cancels the in-flight run — you always
# get feedback on your latest push, fast.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Informational: surfaces formatting drift without blocking the gate.
      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .
        continue-on-error: true

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test
