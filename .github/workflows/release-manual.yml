name: Manual Release

# Override / hotfix path: build and publish a release for an explicit version
# without waiting on the release-please flow. Use for hotfixes or when the
# autonomous pipeline isn't available. The normal path is release.yml.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to release, e.g. v2.0.1'
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve & validate version
        id: version
        env:
          RAW_VERSION: ${{ github.event.inputs.version }}
        run: |
          version="$(printf '%s' "$RAW_VERSION" | tr -d '[:space:]')"
          version="${version%.}"
          if ! printf '%s' "$version" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$'; then
            echo "::error::Invalid version '$RAW_VERSION'. Expected vMAJOR.MINOR.PATCH."
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      # Quality gate — never ship an artifact from code that doesn't pass.
      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build arm64-v8a release APK
        run: flutter build apk --release --target-platform android-arm64 --split-per-abi

      - name: Rename artifact
        id: artifact
        env:
          TAG: ${{ steps.version.outputs.version }}
        run: |
          src="build/app/outputs/flutter-apk/app-arm64-v8a-release.apk"
          dest="build/app/outputs/flutter-apk/Nava-${TAG}-android-arm64.apk"
          mv "$src" "$dest"
          echo "path=$dest" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$dest")" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "🍎 Nava ${{ steps.version.outputs.version }}"
          generate_release_notes: true
          files: ${{ steps.artifact.outputs.path }}
          body: |
            یک بیلد بهینه و پایدار از Nava — ساخته‌شده با Flutter، معماری Riverpod و رابط کاربری Liquid Glass.

            ### 📦 دانلود / Download
            | فایل | معماری | حداقل نسخه اندروید |
            |---|---|---|
            | **`${{ steps.artifact.outputs.name }}`** | `arm64-v8a` | Android 5.0 (API 21)+ |

            > این بیلد فقط برای معماری **arm64-v8a** است.
            > This build targets **arm64-v8a** only.

            ---
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
