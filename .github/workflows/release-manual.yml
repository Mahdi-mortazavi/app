name: Manual Release

# Override / hotfix path: build and publish a release for an explicit version
# without waiting on the release-please flow. Use for hotfixes or when the
# autonomous pipeline isn't available. The normal path is release.yml.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to release, e.g. v2.0.1'
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve & validate version
        id: version
        env:
          RAW_VERSION: ${{ github.event.inputs.version }}
        run: |
          version="$(printf '%s' "$RAW_VERSION" | tr -d '[:space:]')"
          version="${version%.}"
          if ! printf '%s' "$version" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$'; then
            echo "::error::Invalid version '$RAW_VERSION'. Expected vMAJOR.MINOR.PATCH."
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - run: flutter pub get

      # Quality gate — never ship an artifact from code that doesn't pass.
      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Set up release keystore (if secrets configured)
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
            cat > android/key.properties <<EOF
          storeFile=release.keystore
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF
            echo "signed=release" >> "$GITHUB_OUTPUT"
          else
            echo "signed=debug" >> "$GITHUB_OUTPUT"
          fi

      - name: Build split-per-abi APKs (arm64-v8a + armeabi-v7a)
        run: flutter build apk --release --split-per-abi

      - name: Build universal APK
        run: flutter build apk --release

      - name: Package artifacts + SHA256SUMS
        env:
          TAG: ${{ steps.version.outputs.version }}
        run: |
          out="build/app/outputs/flutter-apk"
          mkdir -p dist
          cp "$out/app-arm64-v8a-release.apk"   "dist/Nava-${TAG}-arm64-v8a.apk"
          cp "$out/app-armeabi-v7a-release.apk" "dist/Nava-${TAG}-armeabi-v7a.apk"
          cp "$out/app-release.apk"             "dist/Nava-${TAG}-universal.apk"
          (cd dist && sha256sum ./*.apk > SHA256SUMS.txt && cat SHA256SUMS.txt)

      - name: Compose release notes
        env:
          TAG: ${{ steps.version.outputs.version }}
          SIGNED: ${{ steps.keystore.outputs.signed }}
        run: |
          cat > notes.md <<EOF
          یک بیلد بهینه و پایدار از Nava — ساخته‌شده با Flutter، معماری Riverpod و رابط کاربری Liquid Glass.

          ### 📥 کدام فایل را دانلود کنم؟ / Which file should I download?
          | فایل | مناسب برای |
          |---|---|
          | **Nava-${TAG}-arm64-v8a.apk** ✅ توصیه‌شده | اکثر گوشی‌های ۲۰۱۵ به بعد / most phones since ~2015 |
          | Nava-${TAG}-armeabi-v7a.apk | گوشی‌های قدیمی / older 32-bit phones |
          | Nava-${TAG}-universal.apk | مطمئن نیستید؟ این را بگیرید / not sure? take this (larger) |

          ### 🔐 Verify
          \`sha256sum -c SHA256SUMS.txt\`
          EOF
          if [ "$SIGNED" = "debug" ]; then
            printf '\n> ⚠️ This build is **debug-signed** (no release keystore configured yet).\n' >> notes.md
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "🍎 Nava ${{ steps.version.outputs.version }}"
          generate_release_notes: true
          body_path: notes.md
          files: |
            dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
