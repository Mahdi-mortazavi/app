name: app
description: "Nava - A minimalist productivity app inspired by Jony Ive."
publish_to: 'none'
version: 3.1.0+11

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State management
  flutter_riverpod: ^2.6.1

  # Storage
  shared_preferences: ^2.2.2
  
  # UI & Assets
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8
  flutter_animate: ^4.5.0
  percent_indicator: ^4.2.3
  modal_bottom_sheet: ^3.0.0
  
  # Utilities
  shamsi_date: ^1.0.0
  
  # Critical Updates
  timezone: ^0.10.1
  flutter_timezone: ^3.0.0
  flutter_local_notifications: ^18.0.1
  vibration: ^3.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  # برای ساخت آیکون اپلیکیشن از روی logo.png
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  # *** بخش اضافه شده برای خواندن عکس‌ها ***
  assets:
    - assets/
    # Keeps the OFL license text alongside the bundled fonts.
    - assets/google_fonts/

  # Vazirmatn is declared as a first-class Flutter font family (not loaded
  # through google_fonts at runtime) so EVERY weight resolves natively for
  # any Text — including raw TextStyles that only inherit the family from the
  # theme, and text inside modal sheets. Offline on first launch, and the
  # weights render faithfully in golden screenshots.
  fonts:
    - family: Vazirmatn
      fonts:
        - asset: assets/google_fonts/Vazirmatn-Light.ttf
          weight: 300
        - asset: assets/google_fonts/Vazirmatn-Regular.ttf
          weight: 400
        - asset: assets/google_fonts/Vazirmatn-Medium.ttf
          weight: 500
        - asset: assets/google_fonts/Vazirmatn-SemiBold.ttf
          weight: 600
        - asset: assets/google_fonts/Vazirmatn-Bold.ttf
          weight: 700
        - asset: assets/google_fonts/Vazirmatn-ExtraBold.ttf
          weight: 800

# *** تنظیمات ساخت آیکون اپلیکیشن ***
# هر وقت خواستید آیکون عوض شود، دستور ساخت را در ترمینال بزنید
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/logo.png" # مطمئن شوید فایل logo.png در پوشه assets باشد
  min_sdk_android: 21

# *** حل مشکل تداخل نسخه‌ها ***
dependency_overrides:
  flutter_local_notifications: 18.0.1
